image:
  repository: "quay.io/backstage-performance/locust-k8s-operator"
  tag: "latest"
  pullPolicy: Always

# OpenShift compatibility: Let restricted-v2 SCC assign UID/GID dynamically
# Do not set runAsUser/fsGroup - OpenShift will inject namespace-allocated IDs
# Only set runAsNonRoot to satisfy security requirements
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  # Explicitly do NOT set runAsUser - let OpenShift SCC assign it

k8s:
  clusterRole:
    enabled: true

config:
  loadGenerationPods:
    resource:
      cpuRequest: 250m
      memRequest: 128Mi
      ephemeralRequest: 30Mi
      cpuLimit: 2000m
      memLimit: 2Gi
      ephemeralLimit: 100Mi
    metricsExporter:
      image: "quay.io/backstage-performance/locust_exporter:latest"
      pullPolicy: Always