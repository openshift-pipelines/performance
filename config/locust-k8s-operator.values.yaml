image:
  repository: "quay.io/backstage-performance/locust-k8s-operator"
  tag: "latest"
  pullPolicy: Always

# OpenShift compatibility: Override security context to allow SCC assignment
# OpenShift will assign UID/GID from the namespace's allowed range
securityContext: {}
podSecurityContext: {}

k8s:
  clusterRole:
    enabled: true

config:
  loadGenerationPods:
    resource:
      cpuRequest: 250m
      memRequest: 128Mi
      ephemeralRequest: 30Mi
      cpuLimit: 2000m
      memLimit: 2Gi
      ephemeralLimit: 100Mi
    metricsExporter:
      image: "quay.io/backstage-performance/locust_exporter:latest"
      pullPolicy: Always