apiVersion: locust.io/v1
kind: LocustTest
metadata:
  name: ${SCENARIO}-test
spec:
  image: locustio/locust:2.43.4
  workers: ${LOCUST_WORKERS}
  args:
    --locustfile /home/locust/${SCENARIO}.py
    --host ${LOCUST_HOST}
    --users ${LOCUST_USERS}
    --spawn-rate ${LOCUST_SPAWN_RATE}
    --run-time ${LOCUST_DURATION}
    --headless
    ${LOCUST_EXTRA_CMD}
  locustfile:
    configMap:
      name: locust.${SCENARIO}