  # etcd metrics
  - name: "measurements_etcdMvccDbTotalSizeInBytesAverage_mean"
    jsonpath: "$.measurements.etcd_mvcc_db_total_size_in_bytes_average.mean"
    description: "Mean etcd database total size"
